name: Release bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to package and release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-bundle:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}

    steps:
      - name: Resolve tag
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TAG_NAME"
          echo "TAG_NAME=$TAG_NAME"

      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Check required files
        shell: bash
        run: |
          set -euo pipefail
          test -d assets
          test -f INTEGRITY-MANIFEST.md
          test -f LICENSE
          test -f OWL-1-NORMATIVE.md
          test -f OWL-2-NON-NORMATIVE.md
          test -f OWL-3-CRITICAL.md
          test -f OWL-4-METACOGNITIVE.md
          test -f OWL-SEMAPHORE-SYSTEM.md
          test -f RELEASE-HASHES.txt
          test -f VALIDATION-SCRIPT-SPEC.md

      - name: Build release bundle
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_ROOT="dist/owl-semaphore-${TAG_NAME}"
          mkdir -p "$BUNDLE_ROOT"

          cp -R assets "$BUNDLE_ROOT/"
          cp INTEGRITY-MANIFEST.md "$BUNDLE_ROOT/"
          cp LICENSE "$BUNDLE_ROOT/"
          cp OWL-1-NORMATIVE.md "$BUNDLE_ROOT/"
          cp OWL-2-NON-NORMATIVE.md "$BUNDLE_ROOT/"
          cp OWL-3-CRITICAL.md "$BUNDLE_ROOT/"
          cp OWL-4-METACOGNITIVE.md "$BUNDLE_ROOT/"
          cp OWL-SEMAPHORE-SYSTEM.md "$BUNDLE_ROOT/"
          cp RELEASE-HASHES.txt "$BUNDLE_ROOT/"
          cp VALIDATION-SCRIPT-SPEC.md "$BUNDLE_ROOT/"

          cd dist
          zip -r "owl-semaphore-${TAG_NAME}-release-bundle.zip" "owl-semaphore-${TAG_NAME}"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > RELEASE_NOTES.md <<EOF
          ## Owl Semaphore ${TAG_NAME}

          Full-source, integrity-verifiable release of the Owl Semaphore badge system.

          This release packages the complete asset system, documentation, and validation materials into a single reproducible bundle.

          ### Included
          - Full \`assets/\` directory
          - \`INTEGRITY-MANIFEST.md\`
          - \`LICENSE\`
          - \`OWL-1-NORMATIVE.md\`
          - \`OWL-2-NON-NORMATIVE.md\`
          - \`OWL-3-CRITICAL.md\`
          - \`OWL-4-METACOGNITIVE.md\`
          - \`OWL-SEMAPHORE-SYSTEM.md\`
          - \`RELEASE-HASHES.txt\`
          - \`VALIDATION-SCRIPT-SPEC.md\`

          ### License
          CC-BY-4.0
          EOF

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release already exists for $TAG_NAME"
          else
            gh release create "$TAG_NAME" \
              "dist/owl-semaphore-${TAG_NAME}-release-bundle.zip" \
              --verify-tag \
              --title "Owl Semaphore ${TAG_NAME} — Full Source & Release Bundle" \
              --notes-file RELEASE_NOTES.md
          fi

      - name: Upload or replace release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" \
            "dist/owl-semaphore-${TAG_NAME}-release-bundle.zip" \
            --clobber

      - name: Show release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME"
