name: Attach release bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to package and upload
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bundle-release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag || github.event.release.tag_name }}

    steps:
      - name: Check tag value
        run: |
          test -n "$TAG_NAME"
          echo "TAG_NAME=$TAG_NAME"

      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Build release bundle
        run: |
          set -euo pipefail

          BUNDLE_ROOT="dist/owl-semaphore-${TAG_NAME}"
          mkdir -p "$BUNDLE_ROOT"

          cp -R assets "$BUNDLE_ROOT/"

          cp INTEGRITY-MANIFEST.md "$BUNDLE_ROOT/"
          cp LICENSE "$BUNDLE_ROOT/"
          cp OWL-1-NORMATIVE.md "$BUNDLE_ROOT/"
          cp OWL-2-NON-NORMATIVE.md "$BUNDLE_ROOT/"
          cp OWL-3-CRITICAL.md "$BUNDLE_ROOT/"
          cp OWL-4-METACOGNITIVE.md "$BUNDLE_ROOT/"
          cp OWL-SEMAPHORE-SYSTEM.md "$BUNDLE_ROOT/"
          cp RELEASE-HASHES.txt "$BUNDLE_ROOT/"
          cp VALIDATION-SCRIPT-SPEC.md "$BUNDLE_ROOT/"

          cd dist
          zip -r "owl-semaphore-${TAG_NAME}-release-bundle.zip" "owl-semaphore-${TAG_NAME}"

      - name: Upload release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" \
            "dist/owl-semaphore-${TAG_NAME}-release-bundle.zip" \
            --clobber
