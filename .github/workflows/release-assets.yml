name: Attach release asset bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to package and upload
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bundle-assets:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag || github.event.release.tag_name }}

    steps:
      - name: Check tag value
        run: |
          test -n "$TAG_NAME"
          echo "TAG_NAME=$TAG_NAME"

      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Create release bundle
        run: |
          set -euo pipefail
          mkdir -p dist
          zip -r "dist/owl-semaphore-${TAG_NAME}-assets.zip" assets

      - name: Upload ZIP to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" \
            "dist/owl-semaphore-${TAG_NAME}-assets.zip" \
            --clobber
