name: Build and Publish Release Bundle

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6

      - name: Get tag name
        run: echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Validate required files
        run: |
          set -e
          test -d assets
          test -f LICENSE
          test -f INTEGRITY-MANIFEST.md
          test -f OWL-1-NORMATIVE.md
          test -f OWL-2-NON-NORMATIVE.md
          test -f OWL-3-CRITICAL.md
          test -f OWL-4-METACOGNITIVE.md
          test -f OWL-SEMAPHORE-SYSTEM.md
          test -f RELEASE-HASHES.txt
          test -f VALIDATION-SCRIPT-SPEC.md

      - name: Build bundle
        run: |
          set -e

          mkdir bundle

          cp -R assets bundle/
          cp LICENSE bundle/
          cp INTEGRITY-MANIFEST.md bundle/
          cp OWL-1-NORMATIVE.md bundle/
          cp OWL-2-NON-NORMATIVE.md bundle/
          cp OWL-3-CRITICAL.md bundle/
          cp OWL-4-METACOGNITIVE.md bundle/
          cp OWL-SEMAPHORE-SYSTEM.md bundle/
          cp RELEASE-HASHES.txt bundle/
          cp VALIDATION-SCRIPT-SPEC.md bundle/

          zip -r owl-semaphore-${TAG}.zip bundle

      - name: Create GitHub Release + upload bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Owl Semaphore ${{ env.TAG }} — Full Source & Release Bundle
          files: owl-semaphore-${{ env.TAG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
